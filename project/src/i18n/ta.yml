welcome_page_body: உங்கள் Agri Smart Cloud சேவைகளை அணுகவும், பயிர்களைக் கண்காணிக்கவும், ecofarm செயல்பாடுகளை நிர்வகிக்கவும், மற்றும் நுண்ணறிவுகளுடன் புதுப்பித்த நிலையில் இருக்கவும் – விவசாயிகள், வாடகைதாரர்கள், வாங்குபவர்கள் மற்றும் தொழிலாளர்களுக்கான ஒரே பாதுகாப்பான தளத்தில்.
welcome_point_1: நிகழ்நேர பயிர் மற்றும் மண் கண்காணிப்பு டாஷ்போர்டு.
welcome_point_2: "விவசாயிகள், தொழிலாளர்கள், வாங்குபவர்கள் மற்றும் வாடகைதாரர்களுக்கான ஒருங்கிணைந்த அணுகல்."

